<div id="loadingScreen">
  <h1>🌍 LEGENDS OF AETHER</h1>
  <p>Carregando mundo...</p>

  <div id="loadingBar">
    <div id="loadingProgress"></div>
  </div>
</div>

<div id="menu">

  <h1>🌍 LEGENDS OF AETHER</h1>

  <p class="subtitle">
    Ultimate Open World RPG
  </p>

  <div class="controls">
    <p>WASD = mover</p>
    <p>SHIFT = correr</p>
    <p>SPACE = pular</p>
    <p>CLICK = atacar</p>
    <p>E = atacar boss</p>
  </div>

  <button id="startBtn">
    ENTRAR NO MUNDO
  </button>

</div>

<!-- HUD -->

<div id="hud">

  <div class="hudBox">
    ❤️ VIDA
    <div id="lifeBar">
      <div id="life"></div>
    </div>
  </div>

  <div class="hudBox">
    ⚡ STAMINA
    <div id="staminaBox">
      <div id="stamina"></div>
    </div>
  </div>

  <div class="hudBox">
    ⭐ XP
    <div id="xpBar">
      <div id="xp"></div>
    </div>
  </div>

  <div id="info">
    💎 Cristais:
    <span id="score">0</span>
  </div>

  <div id="levelBox">
    ⭐ Nível:
    <span id="level">1</span>
  </div>

</div>

<div id="bossBar">
  <div id="bossLife"></div>
</div>

<div id="mission">
  🗡️ Colete 25 cristais
</div>

<div id="inventory">
  ⚔️ Espada
</div>

<div id="crosshair"></div>

<div id="miniMap">
  <div id="playerDot"></div>
</div>

<div id="notification">
  🌟 Bem-vindo ao mundo!
</div>
